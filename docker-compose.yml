services:
  kos-ko:
    image: kos-ko:latest
    container_name: kos-ko
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - safescan_safescan_net
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads

networks:
  safescan_safescan_net:
    external: true
